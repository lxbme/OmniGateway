services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:Z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - ai-net

  redis:
    image: redis:alpine
    container_name: llm_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_storage:/data:Z
    restart: unless-stopped
    networks:
      - ai-net

  embedding-service:
    build:
      context: .
      dockerfile: ./local_embedding_service/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - SERVE_PORT=50051
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS:-1536}
      - LOCAL_EMBED_PROVIDER=${LOCAL_EMBED_PROVIDER:-local-mock}
      - LOCAL_EMBED_MODEL=${LOCAL_EMBED_MODEL:-local-mock-embedding}
    networks:
      - ai-net

  cache-service:
    build:
      context: ./gateway
      dockerfile: dockerfile/Dockerfile.cache
    ports:
      - "50052:50052"
    environment:
      - EMBED_ADDR=embedding-service:50051
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - EMBED_PROVIDER=${EMBED_PROVIDER}
      - EMBED_ENDPOINT=${EMBED_ENDPOINT}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS}
      - CACHE_MODE=${CACHE_MODE}
      - CACHE_STORE_PROVIDER=${CACHE_STORE_PROVIDER}
      - CACHE_BUFFER_SIZE=${CACHE_BUFFER_SIZE}
      - CACHE_WORKER_COUNT=${CACHE_WORKER_COUNT}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - QDRANT_SIMILARITY_THRESHOLD=${QDRANT_SIMILARITY_THRESHOLD}
    depends_on:
      - embedding-service
      - qdrant
    restart: on-failure
    networks:
      - ai-net

  upstream-service:
    build:
      context: ./upstream_service
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    environment:
      - PORT=18080
      - MOCK_COMPLETION_MODEL=${MOCK_COMPLETION_MODEL:-mock-upstream-chat}
    networks:
      - ai-net

  completion-service:
    build:
      context: ./gateway
      dockerfile: dockerfile/Dockerfile.completion
    ports:
      - "50053:50053"
    environment:
      - COMPL_API_KEY=${COMPL_API_KEY}
      - COMPL_ENDPOINT=${COMPL_ENDPOINT}
    depends_on:
      - upstream-service
    networks:
      - ai-net

  auth-service:
    build:
      context: ./gateway
      dockerfile: dockerfile/Dockerfile.auth
    ports:
      - "50054:50054"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_DB=${REDIS_DB:-0}
    depends_on:
      - redis
    networks:
      - ai-net

  gateway:
    build:
      context: ./gateway
      dockerfile: dockerfile/Dockerfile.gateway
    ports:
      - "8080:8080"
      - "127.0.0.1:8081:8081"
    environment:
      - CACHE_ADDR=cache-service:50052
      - COMPL_ADDR=completion-service:50053
      - AUTH_ADDR=auth-service:50054
      - DEBUG_MODE=${DEBUG_MODE}
      - LOG_LEVEL=${LOG_LEVEL:-ERROR}
      - ADMIN_SECRET=${ADMIN_SECRET}
    depends_on:
      - cache-service
      - completion-service
      - auth-service
    restart: on-failure
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge
