syntax = "proto3";

package embedding;

option cc_enable_arenas = true;

import "google/protobuf/empty.proto";

service EmbeddingService {
  rpc GetEmbedding(EmbeddingRequest) returns (EmbeddingResponse);
  rpc GetEmbeddings(EmbeddingBatchRequest) returns (EmbeddingBatchResponse);
  rpc Rerank(RerankRequest) returns (RerankResponse);
  rpc Info(google.protobuf.Empty) returns (InfoResponse);
}

message EmbeddingRequest {
  string text = 1;
}

message EmbeddingResponse {
  repeated float embedding = 1;
  string error = 2;
}

message EmbeddingBatchRequest {
  repeated string texts = 1;
}

message EmbeddingBatchItem {
  repeated float embedding = 1;
  string error = 2;
}

message EmbeddingBatchResponse {
  repeated EmbeddingBatchItem items = 1;
  string error = 2;
}

message RerankQuery {
  string query = 1;
  repeated string documents = 2;
  int32 top_k = 3;
}

message RerankRequest {
  repeated RerankQuery queries = 1;
}

message RerankItem {
  int32 index = 1;
  string document = 2;
  float score = 3;
}

message RerankResult {
  repeated RerankItem items = 1;
  string error = 2;
}

message RerankResponse {
  repeated RerankResult results = 1;
  string error = 2;
}

message InfoResponse {
  string provider = 1;
  string model = 2;
  int32 dimensions = 3;
}
